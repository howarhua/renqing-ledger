apiVersion: apps/v1
kind: Deployment
metadata:
  name: reqin-app
  labels:
    app: reqin-app
spec:
  replicas: 1
  strategy:
    type: Recreate  # 先删旧 Pod，再建新 Pod，避免端口冲突
  selector:
    matchLabels:
      app: reqin-app
  template:
    metadata:
      labels:
        app: reqin-app
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: reqin-app
          image: REGISTRY_URL/IMAGE_NAME:TAG
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
      hostNetwork: true  # 让 Pod 直接使用主机的 IP 和端口
      dnsPolicy: ClusterFirstWithHostNet # 保证 Pod 还能解析集群内服务
