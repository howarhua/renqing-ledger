apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: renqin-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - HOSTNAME
      secretName: TLS_SECRET
  rules:
    - host: HOSTNAME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: renqin-frontend
                port:
                  number: 8080
    - host: ""
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: renqin-frontend
                port:
                  number: 8080
