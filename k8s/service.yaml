apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: renqin-backend
spec:
  selector:
    app: renqin-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: renqin-frontend
spec:
  selector:
    app: renqin-frontend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
